[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "infra-security-agent"
version = "1.0.0"
description = "Professional Adversarial RL Cyber-Range for Infrastructure Security."
requires-python = ">=3.10"
dependencies = [
    "openenv-core[core]>=0.2.0",
    "gymnasium",
    "pydantic",
    "numpy",
    "pandas",
    "openai",
    "python-dotenv",
    "fastapi",
    "uvicorn",
    "requests"
]

[project.scripts]
server = "env.app:main"

[tool.setuptools]
packages = ["env"]
py_modules = ["inference"]
