[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "infra-security-agent"
version = "1.0.0"
description = "Professional Infrastructure Security Agent Workflow for Meta Hackathon"
requires-python = ">=3.10"
dependencies = [
    "openenv-core[core]>=0.2.0",
    "gymnasium",
    "pydantic",
    "numpy",
    "pandas",
    "openai",
    "python-dotenv",
    "fastapi",
    "uvicorn",
    "requests"
]

[project.scripts]
server = "server.app:main"

[project.entry-points."openenv.environments"]
infra-security-agent = "env.security_env:SecurityLogEnv"

[tool.setuptools]
packages = ["env", "server"]
py_modules = ["inference"]

[tool.openenv]
app = "server.app:app"
